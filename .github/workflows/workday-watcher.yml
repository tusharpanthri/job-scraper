name: workday-watcher

on:
  schedule:
    # Runs at :07 past every hour (UTC). Offsetting from :00 avoids the
    # congestion pile-up when everyone's cron fires on the hour, which is
    # one of the reasons GitHub's schedule can run late.
    - cron: '7 * * * *'
  workflow_dispatch: {}   # lets you trigger a manual test run from the Actions tab

permissions:
  contents: write   # required so the job can commit data/ back to the repo

concurrency:
  group: workday-watcher
  cancel-in-progress: false   # queue runs instead of overlapping writes to jobs_db.json

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run scraper
        run: python workday_last3days_watcher.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "job data update $(date -u +'%Y-%m-%dT%H:%MZ')"
            git pull --rebase --autostash
            git push
          fi
